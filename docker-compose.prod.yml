# Production stack: postgres(pgvector) + redis + app + worker + frontend + Caddy.
# Caddy is the single public entrypoint; it terminates TLS and proxies to the
# Next.js frontend, which in turn proxies /api/v1 to the app container.
#
#   cp .env.example .env    # then fill in the secrets
#   docker compose -f docker-compose.prod.yml up -d --build
#
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: emailai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/emailai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      STORAGE_PATH: /app/storage
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      DEBUG: "false"
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        python scripts/seed.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/emailai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      STORAGE_PATH: /app/storage
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m arq app.worker.main.WorkerSettings
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # server-side rewrites target the app container over the internal network
      NEXT_PUBLIC_API_URL: http://app:8000
    depends_on:
      - app
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      # DOMAIN=example.com → automatic HTTPS; leave as ":80" to serve over IP/HTTP
      DOMAIN: ${DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  app_storage:
  caddy_data:
  caddy_config:
